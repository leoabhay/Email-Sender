services:
  - type: web
    name: email-sender-app
    plan: free
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn emailsender.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: email-sender-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

databases:
  - name: email-sender-db
    plan: free
